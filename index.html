<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>غرفة الشطرنج | Chess Room</title>
    <meta name="description" content="غرفة شطرنج مباشرة مع الأصدقاء.">
    <link rel="icon" type="image/jpeg" href="logo.jpg">

    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Cairo:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    
    <link rel="stylesheet" href="style.css?v=20">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
</head>
<body>

    <div class="container">
        <!-- شريط التحكم العلوي المدمج -->
        <div class="top-bar">
            <div class="top-bar-controls">
                <button id="soundToggleBtn" class="icon-btn" title="Toggle Sound">
                    <svg id="soundOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    <svg id="soundOffIcon" style="display: none;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>
                </button>
                <select id="themeChoice" class="lang-btn">
                    <option value="grayscale" data-key="themeGray">رصاصي وأسود</option>
                    <option value="royal" data-key="themeRoyal">ملكي وفضي</option>
                    <option value="modern" data-key="themeModern">داكن حديث</option>
                    <option value="forest" data-key="themeForest">خشبي أخضر</option>
                    <option value="classic" data-key="themeChesscom">فاتح كلاسيكي</option>
                </select>
                <select id="boardStyleChoice" class="lang-btn">
                    <option value="solid" data-key="boardSolid">مربعات سادة</option>
                    <option value="hatched" data-key="boardHatched">مربعات مخططة</option>
                </select>
            </div>
            <button id="langToggleBtn" class="lang-btn">English</button>
        </div>

        <div class="logo-container">
            <h1 id="mainTitle" class="logo-title" data-key="siteTitle">غرفة الشطرنج</h1>
        </div>

        <div id="lobby" class="panel fade-in">
            <div class="form-group">
                <input type="text" id="userName" class="field-input w-full text-center" maxlength="16" placeholder="..." data-key="phName">
            </div>

            <div class="form-group room-input-group">
                <input type="text" id="roomId" inputmode="numeric" maxlength="6" class="field-input text-center" placeholder="رقم الغرفة">
                <button id="lobbyShareBtn" class="icon-btn share-btn" title="مشاركة">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                </button>
            </div>
            <div id="roomLockedBadge" class="room-locked-badge" data-key="msgRoomLocked">🔒 مقفل من رابط مشترك</div>
            <div id="roomError" class="room-error" data-key="msgRoomInvalid">أرقام فقط، من 3 إلى 6 خانات</div>

            <div class="form-row">
                <div class="form-group half-width">
                    <label data-key="labelMinutes">الوقت</label>
                    <select id="timeMinutes">
                        <option value="1">1</option><option value="3" selected>3</option><option value="5">5</option><option value="10">10</option>
                    </select>
                </div>
                <div class="form-group half-width">
                    <label data-key="labelIncrement">الزيادة</label>
                    <select id="timeIncrement">
                        <option value="0" selected>0</option><option value="1">1</option><option value="2">2</option><option value="5">5</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label data-key="labelColor">اللون</label>
                <select id="colorChoice">
                    <option value="random" data-key="colorRandom">عشوائي</option>
                    <option value="white" data-key="colorWhite">أبيض</option>
                    <option value="black" data-key="colorBlack">أسود</option>
                </select>
            </div>

            <div id="connectionError" class="connection-error">
                <span style="color:var(--danger-color); font-weight:bold;" data-key="msgConnFailed">تعذّر الاتصال</span>
                <button id="retryConnBtn" class="btn btn-secondary" data-key="btnRetry">إعادة المحاولة</button>
            </div>

            <button id="createBtn" class="btn btn-primary" data-key="btnEnter">دخول الغرفة</button>
        </div>

        <div id="gameArea" style="display: none; width: 100%;">
            
            <div class="player-bar opp-bar">
                <div class="player-info">
                    <div class="player-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <div id="oppPresence" class="presence-dot presence-offline"></div>
                    </div>
                    <div class="player-details">
                        <span class="player-name" id="oppNameLabel" data-key="playerOpponent">الخصم</span>
                        <div id="topCaptured" class="captured-pieces"></div>
                    </div>
                </div>
                <div id="topTimer" class="timer">03:00</div>
            </div>

            <div class="board-wrapper">
                <div id="disconnectBanner" class="disconnect-banner">
                    <span data-key="msgDisconnected">انقطع الخصم... استسلام بعد</span> <span id="abandonSec" class="sec">30</span>
                </div>
                <div id="board" class="board-style-solid"></div>
                
                <div id="interactiveOverlay" class="status-overlay interactive-layer" style="display: none;">
                    <p id="interactiveMsg" class="overlay-text"></p>
                    <div class="overlay-actions">
                        <button id="acceptActionBtn" class="btn btn-primary overlay-btn" data-key="btnAccept">موافق</button>
                        <button id="declineActionBtn" class="btn btn-gray overlay-btn" data-key="btnDecline">رفض</button>
                    </div>
                </div>
                
                <div id="countdownOverlay" class="status-overlay countdown-text" style="display: none;">3</div>
                
                <div id="waitingOverlay" class="status-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <p class="overlay-text" data-key="msgWaiting">بانتظار الخصم...</p>
                    <div class="overlay-actions">
                        <button id="cancelMatchBtn" class="btn btn-danger overlay-btn" data-key="btnCancel">إلغاء المباراة</button>
                    </div>
                </div>
            </div>

            <div class="player-bar my-bar">
                <div class="player-info">
                    <div class="player-avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                    <div class="player-details">
                        <span class="player-name" id="myNameLabel" data-key="playerYou">أنت</span>
                        <div id="bottomCaptured" class="captured-pieces"></div>
                    </div>
                </div>
                <div id="bottomTimer" class="timer">03:00</div>
            </div>

            <div class="game-actions">
                <button id="resignBtn" class="btn btn-danger fade-in" data-key="btnResign">انسحاب</button>
                <button id="drawOfferBtn" class="btn btn-secondary fade-in" data-key="btnDraw">طلب تعادل</button>
            </div>
            <div class="moves-box fade-in">
                <span id="movesHistory"></span>
            </div>
        </div>

        <div id="endGameModal" class="modal-overlay" style="display: none; z-index: 500;">
            <div class="modal-content pop-in">
                <h2 id="endGameTitle" data-key="titleDraw">النتيجة تعادل</h2>
                <p id="endGameReason" data-key="rsnAgreed">بالاتفاق</p>
                <div class="stats-row">
                    <div class="stat-box"><span id="endGameMoves" class="stat-value">0</span></div>
                </div>
                
                <!-- الأزرار العادية -->
                <div id="modalNormalActions" class="modal-actions">
                    <button id="modalRematchBtn" class="btn btn-primary" data-key="btnRematch">إعادة التحدي</button>
                    <button id="modalCopyPgnBtn" class="btn btn-secondary" data-key="btnCopy">نسخ النقلات</button>
                    <button id="modalHomeBtn" class="btn btn-secondary" style="border: none;" data-key="btnHome">الرئيسية</button>
                </div>

                <!-- أزرار الموافقة والرفض (تظهر فقط إذا الخصم طلب إعادة تحدي) -->
                <div id="modalRematchOfferActions" class="modal-actions" style="display: none;">
                    <p style="margin-bottom: 10px; font-weight: 800; color: var(--text-main);" data-key="msgRematchOffer">الخصم يطلب إعادة التحدي</p>
                    <div style="display: flex; gap: 10px;">
                        <button id="acceptRematchBtn" class="btn btn-primary" data-key="btnAccept">موافق</button>
                        <button id="declineRematchBtn" class="btn btn-gray" data-key="btnDecline">رفض</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="promotionModal" class="modal-overlay" style="display: none; z-index: 600;">
            <div class="modal-content pop-in" style="max-width: 320px; padding: 25px;">
                <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; border:none;" data-key="promptPromotion">اختر الترقية</h3>
                <div class="promotion-pieces" style="display: flex; justify-content: space-around; gap: 10px;">
                    <button class="promo-piece" data-piece="q"><img alt="Queen"></button>
                    <button class="promo-piece" data-piece="n"><img alt="Knight"></button>
                    <button class="promo-piece" data-piece="r"><img alt="Rook"></button>
                    <button class="promo-piece" data-piece="b"><img alt="Bishop"></button>
                </div>
                <button id="cancelPromoBtn" class="btn btn-secondary" style="margin-top: 20px;" data-key="btnCancelPromo">إلغاء</button>
            </div>
        </div>

    </div>
    <div id="toast" class="toast"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js?v=20"></script>
</body>
</html>
