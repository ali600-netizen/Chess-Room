<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chess Room - Online Pro v3</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="theme-silver">
    <div class="container">
        <div class="top-bar">
            <button id="langToggleBtn" class="lang-btn">العربية</button>
        </div>
        
        <h1>Chess Room</h1>

        <div id="lobby" class="panel">
            <h3 data-key="lobbyTitle">Match Setup</h3>
            
            <div class="form-group">
                <label data-key="labelRoom">Room ID</label>
                <input type="text" id="roomId" placeholder="e.g. 1234">
            </div>

            <div class="form-group">
                <label data-key="labelMinutes">Minutes</label>
                <input type="number" id="timeMinutes" value="3" min="1" max="180">
            </div>
            
            <div class="form-group">
                <label data-key="labelIncrement">Increment (Sec)</label>
                <input type="number" id="timeIncrement" value="2" min="0" max="60">
            </div>
            
            <div class="form-group">
                <label data-key="labelColor">Your Color</label>
                <select id="colorChoice">
                    <option value="random" data-key="colorRandom">Random</option>
                    <option value="white" data-key="colorWhite">White</option>
                    <option value="black" data-key="colorBlack">Black</option>
                </select>
            </div>

            <div class="form-group">
                <label data-key="labelTheme">Site Theme</label>
                <select id="themeChoice">
                    <option value="silver" data-key="themeSilver">Navy & Silver Pro</option>
                    <option value="chesscom" data-key="themeChesscom">Classic</option>
                </select>
            </div>
            
            <button id="createBtn" class="btn" data-key="btnEnter">Enter Room</button>
        </div>

        <div id="gameArea" style="display: none; position: relative;">
            <div class="player-bar">
                <span class="player-name" data-key="playerOpponent">Opponent</span>
                <div class="timer" id="topTimer">00:00</div>
            </div>
            
            <div class="board-wrapper">
                <div id="waitingOverlay" class="status-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <span data-key="msgWaiting">Waiting for opponent...</span>
                </div>
                <div id="countdownOverlay" class="status-overlay" style="display: none;">3</div>
                
                <div id="rematchOfferOverlay" class="status-overlay" style="display: none;">
                    <span data-key="msgRematchOffer" style="font-size:1.5rem; margin-bottom:15px; text-align:center;">Opponent offered a rematch!</span>
                    <div style="display:flex; gap:15px; width: 80%;">
                        <button id="acceptRematchBtn" class="btn" data-key="btnAccept">Accept</button>
                        <button id="declineRematchBtn" class="btn btn-danger" data-key="btnDecline">Decline</button>
                    </div>
                </div>

                <div id="board" style="width: 100%;"></div>
            </div>

            <div class="player-bar">
                <span class="player-name" data-key="playerYou">You</span>
                <div class="timer" id="bottomTimer">00:00</div>
            </div>

            <div class="moves-box" id="movesHistory"></div>
            
            <div style="display: flex; gap: 10px; margin-top: 12px;">
                <button id="resignBtn" class="btn btn-danger" style="margin-top: 0;" data-key="btnResign">Resign</button>
                <button id="copyPgnBtn" class="btn btn-secondary" style="margin-top: 0;" data-key="btnCopy">Copy PGN</button>
            </div>

            <div id="endGameModal" class="modal-overlay" style="display: none;">
                <div class="modal-content">
                    <h2 id="endGameTitle">You Won!</h2>
                    <p id="endGameReason">by Checkmate</p>
                    
                    <div class="stats-row">
                        <div class="stat-box">
                            <span class="stat-value" id="endGameMoves">0</span>
                            <span class="stat-label" data-key="labelMoves">Moves</span>
                        </div>
                    </div>
                    
                    <div class="modal-actions">
                        <button id="modalRematchBtn" class="btn" data-key="btnRematch">Rematch</button>
                        <button id="modalHomeBtn" class="btn btn-secondary" data-key="btnHome">Main Menu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
