<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mosul Chess - Multiplayer</title>
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>♟️ Mosul Chess - أونلاين ♟️</h1>

        <div id="lobby">
            <div class="lobby-box">
                <h3>⚔️ إنشاء تحدي جديد</h3>
                <div class="options">
                    <label>الوقت:</label>
                    <select id="timeControl">
                        <option value="3">3 دقائق</option>
                        <option value="5">5 دقائق</option>
                        <option value="10">10 دقائق</option>
                    </select>
                    
                    <label>اللون:</label>
                    <select id="colorSelect">
                        <option value="random">عشوائي 🎲</option>
                        <option value="white">أبيض ⚪</option>
                        <option value="black">أسود ⚫</option>
                    </select>
                </div>
                <button id="createBtn" class="btn primary">إنشاء غرفة</button>
            </div>

            <div class="lobby-box">
                <h3>🤝 الانضمام لتحدي</h3>
                <input type="text" id="roomInput" placeholder="أدخل كود الغرفة هنا...">
                <button id="joinBtn" class="btn secondary">انضمام للرقعة</button>
            </div>
        </div>

        <div id="gameArea" style="display: none;">
            <div class="status-bar">
                <span id="roomDisplay" class="badge"></span>
                <span id="gameStatus">في انتظار الخصم...</span>
            </div>
            
            <div class="timers">
                <div class="timer" id="blackTimer">00:00</div>
                <div id="board" style="width: 100%; max-width: 400px; margin: 15px auto;"></div>
                <div class="timer" id="whiteTimer">00:00</div>
            </div>

            <button id="downloadPgnBtn" class="btn" style="display: none; margin-top: 15px;">📥 تحميل PGN للتحليل</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
