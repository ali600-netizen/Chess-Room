<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>غرفة الشطرنج | Chess Room</title>
    <meta name="description" content="غرفة شطرنج مباشرة مع الأصدقاء — أنشئ غرفة، شارك الرمز، وابدأ اللعب فوراً. Real-time multiplayer chess rooms.">
    <meta property="og:title" content="Chess Room — Mosul Chess">
    <meta property="og:description" content="غرفة شطرنج مباشرة مع الأصدقاء — أنشئ غرفة وشارك الرمز وابدأ اللعب فوراً.">
    <meta property="og:type" content="website">
    <link rel="icon" type="image/png" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Cairo:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.css">
    <link rel="stylesheet" href="style.css?v=14">

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body class="theme-royal">
    <div class="container">
        <div class="top-bar">
            <div class="top-bar-controls">
                <button id="soundToggleBtn" class="icon-btn" title="Sound" aria-label="Toggle sound">
                    <svg id="soundOnIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19.07 4.93a10 10 0 010 14.14M15.54 8.46a5 5 0 010 7.07"/></svg>
                    <svg id="soundOffIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M11 5L6 9H2v6h4l5 4V5z"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                </button>
            </div>
            <button id="langToggleBtn" class="lang-btn">English</button>
        </div>

        <div class="logo-container">
            <img class="site-logo" src="logo.png" alt="Mosul Chess">
            <h1 class="logo-title">Chess Room</h1>
        </div>

        <div id="lobby" class="panel fade-in">
            <h3 data-key="lobbyTitle">Match Setup</h3>

            <div class="room-seal-wrap">
                <div class="room-seal">
                    <span class="room-seal-label" data-key="labelRoom">Room ID</span>
                    <input type="text" id="roomId" inputmode="numeric" maxlength="6" placeholder="1234">
                    <span id="roomLockedBadge" class="room-locked-badge" data-key="msgRoomLocked">🔒 Locked from shared link</span>
                </div>
                <button id="shareRoomBtn" class="btn-share" title="Share" aria-label="Share room link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
                </button>
            </div>
            <span id="roomError" class="room-error" data-key="msgRoomInvalid">Numbers only, 3–6 digits</span>

            <div class="form-group username-row">
                <label data-key="labelName">Your Name</label>
                <input type="text" id="userName" class="field-input" maxlength="16" placeholder="...">
            </div>

            <div class="form-group">
                <label data-key="labelMinutes">Minutes</label>
                <input type="number" id="timeMinutes" value="3" min="1" max="180">
            </div>

            <div class="form-group">
                <label data-key="labelIncrement">Increment (Sec)</label>
                <input type="number" id="timeIncrement" value="2" min="0" max="60">
            </div>

            <div class="form-group">
                <label data-key="labelColor">Your Color</label>
                <select id="colorChoice">
                    <option value="random" data-key="colorRandom">Random</option>
                    <option value="white" data-key="colorWhite">White</option>
                    <option value="black" data-key="colorBlack">Black</option>
                </select>
            </div>

            <div class="form-group">
                <label data-key="labelTheme">Theme</label>
                <select id="themeChoice">
                    <option value="royal" data-key="themeRoyal">Royal Navy & Gold</option>
                    <option value="modern" data-key="themeModern">Modern Dark</option>
                    <option value="classic" data-key="themeChesscom">Classic Light</option>
                </select>
            </div>

            <button id="createBtn" class="btn btn-primary" data-key="btnEnter" disabled>Connecting...</button>

            <div id="connectionError" class="connection-error">
                <span data-key="msgConnFailed">Couldn't connect. Check your internet.</span>
                <button id="retryConnBtn" class="btn btn-secondary" data-key="btnRetry" style="width:auto; padding:10px 24px;">Retry</button>
            </div>
        </div>

        <div id="gameArea" style="display: none; position: relative;" class="fade-in">
            <div class="player-bar opp-bar">
                <div class="player-info">
                    <div class="player-avatar opp-avatar">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 8 1.34 8 4v2H4v-2c0-2.66 5.3-4 8-4zm0-10a4 4 0 110 8 4 4 0 010-8z"/></svg>
                        <div class="presence-dot" id="oppPresence"></div>
                    </div>
                    <div class="player-details">
                        <span class="player-name" id="oppNameLabel" data-key="playerOpponent">Opponent</span>
                        <div class="captured-pieces" id="topCaptured"></div>
                    </div>
                </div>
                <div class="timer" id="topTimer">00:00</div>
            </div>

            <div class="board-wrapper">
                <div id="disconnectBanner" class="disconnect-banner">
                    <span data-key="msgDisconnected">Opponent missing...</span>
                    <span id="abandonSec" class="sec">30</span>s
                </div>

                <div id="waitingOverlay" class="status-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <span data-key="msgWaiting" class="overlay-text">Waiting for opponent...</span>
                    <button id="cancelMatchBtn" class="btn btn-danger overlay-btn" data-key="btnCancel">Cancel Match</button>
                </div>

                <div id="countdownOverlay" class="status-overlay countdown-text" style="display: none;">3</div>

                <div id="interactiveOverlay" class="status-overlay interactive-layer" style="display: none;">
                    <span id="interactiveMsg" class="overlay-text">Action requested!</span>
                    <div class="overlay-actions">
                        <button id="acceptActionBtn" class="btn btn-primary" data-key="btnAccept">Accept</button>
                        <button id="declineActionBtn" class="btn btn-danger" data-key="btnDecline">Decline</button>
                    </div>
                </div>

                <div id="board" style="width: 100%;"></div>
            </div>

            <div class="player-bar my-bar">
                <div class="player-info">
                    <div class="player-avatar my-avatar">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 8 1.34 8 4v2H4v-2c0-2.66 5.3-4 8-4zm0-10a4 4 0 110 8 4 4 0 010-8z"/></svg>
                        <div class="presence-dot presence-online" id="myPresence"></div>
                    </div>
                    <div class="player-details">
                        <span class="player-name" id="myNameLabel" data-key="playerYou">You</span>
                        <div class="captured-pieces" id="bottomCaptured"></div>
                    </div>
                </div>
                <div class="timer" id="bottomTimer">00:00</div>
            </div>

            <div class="moves-box" id="movesHistory"></div>

            <div class="game-actions">
                <button id="resignBtn" class="btn btn-danger" data-key="btnResign">Resign</button>
                <button id="drawOfferBtn" class="btn btn-secondary" data-key="btnDraw">Offer Draw</button>
            </div>

            <div id="endGameModal" class="modal-overlay" style="display: none;">
                <div class="modal-content pop-in">
                    <h2 id="endGameTitle">Game Over</h2>
                    <p id="endGameReason">by Checkmate</p>

                    <div class="stats-row">
                        <div class="stat-box">
                            <span class="stat-value" id="endGameMoves">0</span>
                            <span class="stat-label" data-key="labelMoves">Moves</span>
                        </div>
                    </div>

                    <div class="modal-actions">
                        <button id="modalRematchBtn" class="btn btn-primary" data-key="btnRematch">Rematch</button>
                        <button id="modalCopyPgnBtn" class="btn btn-secondary" data-key="btnCopy">Copy PGN</button>
                        <button id="modalHomeBtn" class="btn btn-secondary" data-key="btnHome">Main Menu</button>
                    </div>
                </div>
            </div>

            <!-- نافذة ترقية البيدق -->
            <div id="promotionModal" class="modal-overlay" style="display: none; z-index: 400;">
                <div class="modal-content pop-in" style="max-width: 300px; padding: 25px;">
                    <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.3rem; border:none; padding-bottom:0;" data-key="promptPromotion">Choose Promotion</h3>
                    <div class="promotion-pieces" style="display: flex; justify-content: space-around; align-items: center; gap: 10px;">
                        <button class="promo-piece" data-piece="q"><img alt="Queen"></button>
                        <button class="promo-piece" data-piece="n"><img alt="Knight"></button>
                        <button class="promo-piece" data-piece="r"><img alt="Rook"></button>
                        <button class="promo-piece" data-piece="b"><img alt="Bishop"></button>
                    </div>
                    <button id="cancelPromoBtn" class="btn btn-secondary" style="margin-top: 20px; padding: 12px;" data-key="btnCancelPromo">Cancel</button>
                </div>
            </div>

        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="script.js?v=14"></script>
</body>
</html>
